version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: options_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: options_trading
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: options_redis
    restart: always
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: options_rabbitmq
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: options_api
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/options_trading
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9ca7688267df88e99e4cb2e64dcfa82e88a3857d4a6bb4cb4a8f94d13bfdc9e9
      - ENCRYPTION_KEY=h8m3n8L5d_5rV-Fj1K3Pz9OqP7L9wN3mK5L8J9R3f2U=
    depends_on:
      - db
      - redis
      - rabbitmq

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: options_worker
    command: celery -A app.workers.celery_app worker --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/options_trading
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9ca7688267df88e99e4cb2e64dcfa82e88a3857d4a6bb4cb4a8f94d13bfdc9e9
      - ENCRYPTION_KEY=h8m3n8L5d_5rV-Fj1K3Pz9OqP7L9wN3mK5L8J9R3f2U=
    depends_on:
      - db
      - redis
      - rabbitmq

  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: options_beat
    command: celery -A app.workers.celery_app beat --loglevel=info
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgrespassword@db:5432/options_trading
      - RABBITMQ_URL=amqp://guest:guest@rabbitmq:5672//
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=9ca7688267df88e99e4cb2e64dcfa82e88a3857d4a6bb4cb4a8f94d13bfdc9e9
      - ENCRYPTION_KEY=h8m3n8L5d_5rV-Fj1K3Pz9OqP7L9wN3mK5L8J9R3f2U=
    depends_on:
      - redis
      - rabbitmq

volumes:
  postgres_data:
